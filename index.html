<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSSS Ratthanthal | Government Senior Secondary School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold-1: #f0c040;
    --gold-2: #d4a017;
    --gold-3: #b8860b;
    --gold-4: #ffd700;
    --gold-5: #ffe066;
    --dark-1: #020408;
    --dark-2: #070d14;
    --dark-3: #0d1520;
    --dark-4: #111d2a;
    --dark-5: #162030;
    --glass-1: rgba(255,255,255,0.03);
    --glass-2: rgba(255,255,255,0.06);
    --glass-3: rgba(240,192,64,0.08);
    --neon-blue: #00c8ff;
    --neon-purple: #a855f7;
    --neon-gold: #f0c040;
    --text-primary: #f0e6c0;
    --text-secondary: #a89060;
    --text-muted: #5a4a30;
    --border-gold: rgba(240,192,64,0.25);
    --border-subtle: rgba(255,255,255,0.06);
    --shadow-gold: 0 0 40px rgba(240,192,64,0.15);
    --shadow-deep: 0 30px 80px rgba(0,0,0,0.8);
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 40px;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    background: var(--dark-1);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* ═══════════════════════════════════════
     CUSTOM CURSOR
  ═══════════════════════════════════════ */
  #cursor-dot {
    width: 8px; height: 8px;
    background: var(--gold-1);
    border-radius: 50%;
    position: fixed; top:0; left:0;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-50%,-50%);
    transition: transform 0.1s, background 0.3s;
    box-shadow: 0 0 12px var(--gold-1), 0 0 24px rgba(240,192,64,0.4);
  }
  #cursor-ring {
    width: 36px; height: 36px;
    border: 1.5px solid rgba(240,192,64,0.6);
    border-radius: 50%;
    position: fixed; top:0; left:0;
    pointer-events: none;
    z-index: 99998;
    transform: translate(-50%,-50%);
    transition: transform 0.15s ease, width 0.3s, height 0.3s, opacity 0.3s;
  }
  body:hover #cursor-dot { opacity:1; }
  a:hover ~ #cursor-ring, button:hover ~ #cursor-ring { width:60px; height:60px; }

  /* ═══════════════════════════════════════
     SCROLL PROGRESS BAR
  ═══════════════════════════════════════ */
  #scroll-progress {
    position: fixed; top:0; left:0; right:0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-3), var(--gold-1), var(--gold-5), var(--gold-1));
    transform-origin: left;
    transform: scaleX(0);
    z-index: 9999;
    box-shadow: 0 0 12px var(--gold-1), 0 0 4px var(--gold-4);
  }

  /* ═══════════════════════════════════════
     LOADING SCREEN
  ═══════════════════════════════════════ */
  #loader {
    position: fixed; inset:0;
    background: var(--dark-1);
    z-index: 100000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  #loader.hidden { opacity:0; visibility:hidden; }

  .loader-emblem {
    width: 120px; height: 120px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .loader-ring {
    position: absolute; inset:0;
    border-radius: 50%;
    border: 2px solid transparent;
    animation: spinRing 2s linear infinite;
  }
  .loader-ring:nth-child(1) {
    border-top-color: var(--gold-1);
    border-right-color: rgba(240,192,64,0.3);
    animation-duration: 1.8s;
  }
  .loader-ring:nth-child(2) {
    inset: 12px;
    border-bottom-color: var(--gold-3);
    border-left-color: rgba(212,160,23,0.3);
    animation-duration: 2.4s;
    animation-direction: reverse;
  }
  .loader-ring:nth-child(3) {
    inset: 24px;
    border-top-color: var(--gold-5);
    animation-duration: 3s;
  }
  .loader-icon {
    font-size: 2.4rem;
    animation: pulseGlow 2s ease-in-out infinite;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }
  @keyframes pulseGlow {
    0%,100% { filter: drop-shadow(0 0 8px var(--gold-1)); }
    50% { filter: drop-shadow(0 0 24px var(--gold-1)) drop-shadow(0 0 48px rgba(240,192,64,0.5)); }
  }

  .loader-title {
    font-family: 'Cinzel', serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: var(--gold-1);
    text-align: center;
    text-transform: uppercase;
  }
  .loader-subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.4em;
    color: var(--text-secondary);
    text-transform: uppercase;
  }
  .loader-bar-wrap {
    width: 280px; height: 2px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    overflow: hidden;
  }
  .loader-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-3), var(--gold-1), var(--gold-5));
    border-radius: 99px;
    animation: loadBar 2.4s ease forwards;
    box-shadow: 0 0 12px var(--gold-1);
  }
  @keyframes loadBar { from{width:0} to{width:100%} }
  .loader-percent {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-secondary);
    letter-spacing: 0.1em;
  }

  /* ═══════════════════════════════════════
     PARTICLES CANVAS
  ═══════════════════════════════════════ */
  #particles-canvas {
    position: fixed; inset:0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* ═══════════════════════════════════════
     NAV
  ═══════════════════════════════════════ */
  #navbar {
    position: fixed; top:0; left:0; right:0;
    z-index: 1000;
    padding: 0 48px;
    height: 72px;
    display: flex; align-items: center; justify-content: space-between;
    transition: background 0.4s, backdrop-filter 0.4s, box-shadow 0.4s;
  }
  #navbar.scrolled {
    background: rgba(2,4,8,0.85);
    backdrop-filter: blur(24px) saturate(1.4);
    box-shadow: 0 1px 0 var(--border-gold), 0 8px 32px rgba(0,0,0,0.6);
  }

  .nav-logo {
    display: flex; align-items: center; gap: 14px;
    text-decoration: none;
  }
  .nav-logo-emblem {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-3), var(--gold-1));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    box-shadow: 0 0 20px rgba(240,192,64,0.4);
    flex-shrink: 0;
  }
  .nav-logo-text { display: flex; flex-direction: column; }
  .nav-logo-name {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--gold-1);
    letter-spacing: 0.08em;
    line-height: 1;
  }
  .nav-logo-sub {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-secondary);
    text-transform: uppercase;
  }

  .nav-links {
    display: flex; align-items: center; gap: 8px;
    list-style: none;
  }
  .nav-links a {
    display: block;
    padding: 8px 16px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
    text-decoration: none;
    border-radius: var(--radius-sm);
    transition: color 0.3s, background 0.3s;
    position: relative;
  }
  .nav-links a::after {
    content:'';
    position: absolute; bottom:4px; left:50%; right:50%;
    height: 1px;
    background: var(--gold-1);
    transition: left 0.3s, right 0.3s;
    box-shadow: 0 0 6px var(--gold-1);
  }
  .nav-links a:hover { color: var(--gold-1); }
  .nav-links a:hover::after { left: 16px; right: 16px; }

  .nav-cta {
    padding: 10px 24px;
    background: linear-gradient(135deg, var(--gold-3), var(--gold-1));
    color: var(--dark-1) !important;
    border-radius: var(--radius-sm);
    font-weight: 700 !important;
    box-shadow: 0 4px 20px rgba(240,192,64,0.3);
    transition: box-shadow 0.3s, transform 0.2s !important;
  }
  .nav-cta:hover { box-shadow: 0 6px 32px rgba(240,192,64,0.5) !important; transform: translateY(-1px); }
  .nav-cta::after { display: none !important; }

  .nav-hamburger {
    display: none;
    flex-direction: column; gap: 5px;
    cursor: pointer; padding: 8px;
  }
  .nav-hamburger span {
    display: block; width: 26px; height: 2px;
    background: var(--gold-1);
    border-radius: 2px;
    transition: all 0.3s;
  }

  /* ═══════════════════════════════════════
     HERO
  ═══════════════════════════════════════ */
  #hero {
    position: relative;
    width: 100%; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #0a1520 0%, #0d1a28 50%, #07111c 100%);
    transform: scale(1.05);
    transition: transform 8s ease;
    filter: brightness(0.25) saturate(0.8);
  }
  .hero-bg::after {
    content:'';
    position: absolute; inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(240,192,64,0.12) 0%, transparent 60%),
      linear-gradient(180deg, rgba(2,4,8,0.3) 0%, rgba(2,4,8,0.6) 60%, var(--dark-1) 100%);
  }

  .hero-particles {
    position: absolute; inset:0;
    pointer-events: none;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 960px;
    padding: 0 24px;
  }

  .hero-badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 22px;
    background: rgba(240,192,64,0.08);
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: 99px;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-1);
    margin-bottom: 32px;
    animation: fadeInUp 0.8s ease 0.3s both;
    backdrop-filter: blur(8px);
  }
  .hero-badge::before {
    content:'';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold-1);
    box-shadow: 0 0 8px var(--gold-1);
    animation: blink 2s ease infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .hero-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.8rem, 6vw, 6rem);
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
    animation: fadeInUp 0.8s ease 0.5s both;
  }
  .hero-title .line-gold {
    background: linear-gradient(90deg, var(--gold-3), var(--gold-1), var(--gold-5), var(--gold-2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 24px rgba(240,192,64,0.4));
  }
  .hero-title .line-white { color: #fff; }

  .hero-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    font-style: italic;
    color: var(--text-secondary);
    margin-bottom: 48px;
    line-height: 1.6;
    animation: fadeInUp 0.8s ease 0.7s both;
  }

  .hero-quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.9rem, 1.5vw, 1.15rem);
    color: rgba(240,192,64,0.7);
    margin-bottom: 52px;
    letter-spacing: 0.04em;
    animation: fadeInUp 0.8s ease 0.9s both;
  }
  .hero-quote::before { content: '"'; }
  .hero-quote::after { content: '"'; }

  .hero-actions {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    animation: fadeInUp 0.8s ease 1.1s both;
  }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 40px;
    background: linear-gradient(135deg, var(--gold-3) 0%, var(--gold-1) 50%, var(--gold-5) 100%);
    color: var(--dark-1);
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none; border-radius: var(--radius-sm);
    cursor: pointer; text-decoration: none;
    position: relative; overflow: hidden;
    box-shadow: 0 8px 32px rgba(240,192,64,0.35), 0 2px 8px rgba(0,0,0,0.5);
    transition: transform 0.2s, box-shadow 0.3s;
  }
  .btn-primary::before {
    content:'';
    position: absolute; inset:0;
    background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 48px rgba(240,192,64,0.5), 0 4px 16px rgba(0,0,0,0.5); }
  .btn-primary:hover::before { transform: translateX(100%); }

  .btn-ghost {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 15px 40px;
    background: transparent;
    color: var(--gold-1);
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: 1px solid rgba(240,192,64,0.4);
    border-radius: var(--radius-sm);
    cursor: pointer; text-decoration: none;
    backdrop-filter: blur(8px);
    transition: all 0.3s;
    box-shadow: inset 0 0 0 0 rgba(240,192,64,0.1);
  }
  .btn-ghost:hover {
    background: rgba(240,192,64,0.08);
    border-color: var(--gold-1);
    box-shadow: 0 0 24px rgba(240,192,64,0.2), inset 0 0 24px rgba(240,192,64,0.05);
  }

  .hero-scroll-cue {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    animation: fadeInUp 1s ease 1.5s both;
    z-index: 2;
  }
  .hero-scroll-cue span {
    font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--text-muted);
  }
  .scroll-line {
    width: 1px; height: 60px;
    background: linear-gradient(180deg, transparent, var(--gold-1), transparent);
    animation: scrollLine 2s ease-in-out infinite;
  }
  @keyframes scrollLine {
    0%,100% { transform: scaleY(0); transform-origin: top; }
    50% { transform: scaleY(1); transform-origin: top; }
  }

  /* ═══════════════════════════════════════
     STATS BANNER
  ═══════════════════════════════════════ */
  #stats-banner {
    position: relative; z-index: 2;
    padding: 0 48px;
    margin-top: -2px;
  }
  .stats-inner {
    max-width: 1200px; margin: 0 auto;
    background: var(--glass-3);
    border: 1px solid var(--border-gold);
    border-radius: var(--radius-lg);
    backdrop-filter: blur(24px);
    display: grid; grid-template-columns: repeat(4, 1fr);
    overflow: hidden;
    box-shadow: var(--shadow-gold), var(--shadow-deep);
  }
  .stat-item {
    padding: 40px 32px;
    text-align: center;
    border-right: 1px solid var(--border-gold);
    position: relative;
    transition: background 0.3s;
  }
  .stat-item:last-child { border-right: none; }
  .stat-item:hover { background: rgba(240,192,64,0.05); }
  .stat-number {
    font-family: 'Cinzel', serif;
    font-size: 3rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-3), var(--gold-1), var(--gold-5));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
    display: block;
  }
  .stat-label {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  /* ═══════════════════════════════════════
     SECTION COMMON
  ═══════════════════════════════════════ */
  section {
    position: relative; z-index: 2;
    padding: 120px 48px;
  }

  .section-inner { max-width: 1200px; margin: 0 auto; }

  .section-label {
    display: inline-flex; align-items: center; gap: 12px;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold-1);
    margin-bottom: 16px;
  }
  .section-label::before, .section-label::after {
    content:'';
    height: 1px; width: 32px;
    background: linear-gradient(90deg, transparent, var(--gold-1));
  }
  .section-label::after { background: linear-gradient(90deg, var(--gold-1), transparent); }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 4vw, 3.5rem);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 16px;
    color: var(--text-primary);
  }
  .section-title .accent {
    background: linear-gradient(90deg, var(--gold-3), var(--gold-1), var(--gold-5));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .section-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    color: var(--text-secondary);
    line-height: 1.8;
    max-width: 600px;
  }

  @keyframes fadeInUp {
    from { opacity:0; transform: translateY(32px); }
    to { opacity:1; transform: translateY(0); }
  }
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .reveal.visible { opacity:1; transform: translateY(0); }
  .reveal-left { opacity:0; transform: translateX(-40px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .reveal-left.visible { opacity:1; transform: translateX(0); }
  .reveal-right { opacity:0; transform: translateX(40px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .reveal-right.visible { opacity:1; transform: translateX(0); }

  /* ═══════════════════════════════════════
     ABOUT
  ═══════════════════════════════════════ */
  #about { background: linear-gradient(180deg, var(--dark-1) 0%, var(--dark-3) 100%); }

  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: center;
    margin-top: 72px;
  }

  .about-image-wrap {
    position: relative; border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .about-image-wrap img {
    width: 100%; aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    transition: transform 0.6s ease;
    filter: brightness(0.85) saturate(0.9);
  }
  .about-image-wrap:hover img { transform: scale(1.04); }
  .about-image-wrap::before {
    content:'';
    position: absolute; inset:0; z-index:1;
    background: linear-gradient(135deg, rgba(240,192,64,0.12) 0%, transparent 60%);
    pointer-events: none;
  }
  .about-image-frame {
    position: absolute; inset: -12px;
    border: 1px solid var(--border-gold);
    border-radius: calc(var(--radius-lg) + 12px);
    pointer-events: none;
    z-index: -1;
  }
  .about-image-badge {
    position: absolute; bottom: 24px; left: 24px; z-index: 2;
    background: rgba(2,4,8,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-gold);
    border-radius: var(--radius-md);
    padding: 16px 20px;
  }
  .about-image-badge .est {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--gold-1);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .about-image-badge .year {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--gold-1);
    line-height: 1;
  }

  .about-content { display: flex; flex-direction: column; gap: 24px; }

  .about-intro {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    line-height: 1.9;
    color: var(--text-secondary);
  }

  .about-cards {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-top: 8px;
  }
  .about-card {
    background: var(--glass-1);
    border: 1px solid var(--border-gold);
    border-radius: var(--radius-md);
    padding: 24px;
    backdrop-filter: blur(12px);
    transition: background 0.3s, box-shadow 0.3s, transform 0.3s;
    cursor: default;
  }
  .about-card:hover {
    background: var(--glass-3);
    box-shadow: var(--shadow-gold);
    transform: translateY(-4px);
  }
  .about-card-icon { font-size: 1.6rem; margin-bottom: 12px; }
  .about-card-title {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--gold-1);
    letter-spacing: 0.08em;
